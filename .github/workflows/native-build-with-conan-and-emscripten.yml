name: "Native build to WebAssembly using Conan and Emscripten"

on:
  push:
    # Pushes to master publish a dev version of the `qlever` npm package under
    # the `next` dist-tag; version tags publish the release under `latest`
    # (see the `Publish to npm` step below).
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master ]
  merge_group:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

env:
  # Bump this to upgrade `emsdk`. The version must exist as a tag in the upstream
  # https://github.com/emscripten-core/emsdk repository. We install `emsdk`
  # directly (rather than via the Conan recipe) because the Conan Center recipe
  # is outdated. Make sure to also change the version in
  # `conanprofiles/emscripten.profile` when changing this!
  EMSDK_VERSION: "6.0.2"

# The default GITHUB_TOKEN only needs to read the repository here.
# `id-token: write` lets `npm publish --provenance` attest (via GitHub's OIDC
# provider) that the package was built by this workflow.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history, so that `git describe` can derive the npm package
          # version of dev builds from the most recent release tag (see the
          # `Assemble npm package` step).
          fetch-depth: 0

      - name: Set up emsdk ${{ env.EMSDK_VERSION }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache-${{ env.EMSDK_VERSION }}

      # `emsdk` shells out to `node` during compilation, so a working `node` has to
      # be on `PATH` even though we never invoke it directly.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          # Writes an `.npmrc` that authenticates `npm publish` via the
          # `NODE_AUTH_TOKEN` environment variable (see `Publish to npm`).
          registry-url: "https://registry.npmjs.org"

      # `emcc` needs `tsc` at link time to generate the TypeScript definitions
      # for the `qleverwasm` target.
      - name: Install TypeScript
        run: npm install -g typescript

      - name: Install conan
        run: pipx install conan

      - name: Configure default conan profile
        run: conan profile detect --force

      # `compiler.version` in a conan profile isn't a pointer to an installed
      # binary, `emcc` is found via `PATH` (from setup-emsdk) and cross-compile
      # rules come from `Emscripten.cmake` (wired in via the profile's
      # `tools.cmake.cmaketoolchain:user_toolchain`). The version string is a
      # label that goes into the package-ID hash so wasm-built dependencies
      # tagged with one `emsdk` version are never silently reused with another.
      # `settings_user.yml` is conan's official extension hook for adding a
      # version the bundled list doesn't know about yet.
      - name: Register emsdk version with conan settings
        run: |
          cat > ~/.conan2/settings_user.yml <<EOF
          compiler:
            emcc:
              version: ["${EMSDK_VERSION}"]
          EOF

      - name: Cache conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: ${{ runner.os }}-conan-emscripten-${{ env.EMSDK_VERSION }}-${{ hashFiles('conanfile.txt', 'conanprofiles/emscripten.profile') }}
          # On an exact-key miss (e.g. small change to `conanfile.txt` or the
          # profile), fall back to the most recent cache for this `emsdk`
          # version. Conan reuses unchanged binary packages and only rebuilds
          # what changed; without this, any change forces a full rebuild of
          # boost/icu/openssl for `wasm64`.
          restore-keys: |
            ${{ runner.os }}-conan-emscripten-${{ env.EMSDK_VERSION }}-
            ${{ runner.os }}-conan-emscripten-

      - name: Install dependencies via conan
        run: conan install . -pr:b default -pr:h conanprofiles/emscripten.profile -s build_type=Release -b missing -of build

      - name: Configure CMake
        run: >
          cmake -S . -B build -GNinja
          -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DLOGLEVEL=INFO
          -DUSE_PARALLEL=true
          -D_NO_TIMING_TESTS=ON
          -D_EMSCRIPTEN_NO_INDEXBUILDER_AND_SERVER=ON
          -D_NO_BENCHMARK=ON
          -D_DISABLE_EMSCRIPTEN_PROBLEMATIC_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      # Assemble the `qlever` npm package (see `src/libqlever/npm/`) on every
      # run, so that pull requests also validate the packaging and the tarball
      # can be downloaded from any CI run. Publishing happens only for version
      # tags (below).
      - name: Assemble npm package
        working-directory: src/libqlever/npm
        run: |
          cp ../../../build/src/libqlever/qlever.js ../../../build/src/libqlever/qlever.wasm ../../../build/src/libqlever/qlever.d.ts .
          # For a release tag `vX.Y.Z` the package version is `X.Y.Z`. All
          # other builds get a prerelease of the NEXT patch version, derived
          # from the most recent release tag, e.g. `0.5.51-dev.17.g473fd17`
          # (17 commits after `v0.5.50`). Prerelease versions are invisible to
          # semver range resolution (`^0.5.50`, `~0.5.51`, and even `*` never
          # match them), so users can only ever get one by asking for it
          # explicitly, either by exact version or via the `next` dist-tag.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            DESCRIBE=$(git describe --tags --long --match 'v[0-9]*')
            if [[ "${DESCRIBE}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-([0-9]+)-g([0-9a-f]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))-dev.${BASH_REMATCH[4]}.g${BASH_REMATCH[5]}"
            else
              echo "::error::Cannot derive a version from 'git describe' output '${DESCRIBE}'"
              exit 1
            fi
          fi
          echo "Package version: ${VERSION}"
          npm version --no-git-tag-version "${VERSION}"
          npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: qlever-npm-package
          path: src/libqlever/npm/qlever-*.tgz

      # Release tags publish to the default `latest` dist-tag (what a plain
      # `npm install qlever` resolves to). Pushes to master publish the dev
      # version under the `next` dist-tag, which never affects `latest`;
      # users opt in explicitly with `npm install qlever@next`. Pull requests
      # and merge groups only build and upload the tarball, never publish.
      - name: Publish to npm
        if: github.ref_type == 'tag' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            DIST_TAG=latest
          else
            DIST_TAG=next
          fi
          npm publish src/libqlever/npm/qlever-*.tgz --provenance --access public --tag "${DIST_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
