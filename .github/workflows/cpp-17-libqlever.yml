name: CPP17 libQLever

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  merge_group:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

# The default GITHUB_TOKEN only needs to read the repository here.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    # The CMake configure and build commands are platform-agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler-version: 11
            build-target: "LibQLeverExample"
            warnings: ""
            use-keep-going: false
            use-ignore-errors: false
            additional-cmake-options: "-DREDUCED_FEATURE_SET_FOR_CPP17=ON"
          - compiler-version: 8
            # Build every target (not just `LibQLeverExample`): the
            # `REDUCED_FEATURE_SET_FOR_CPP17` guards added throughout the
            # CMakeLists.txt files (around the `http`/`server` libraries, the
            # tests that depend on them, and the handful of tests that
            # directly exercise `cppcoro::generator`-based coroutine
            # machinery) mean that only C++17-compatible targets are defined
            # at all in this configuration, so building everything is both
            # possible and the point: it is how the unit test suite itself
            # gets built and, below, run under real C++17.
            build-target: ""
            # Real gcc-8 (unlike the gcc-11 + `-fconcepts` combination used for
            # the other matrix entry) does not accept attributes it does not
            # know about (e.g. `[[no_unique_address]]`, which is C++20-only)
            # silently; without `-Wno-attributes` the build log fills up with
            # thousands of "unknown attribute ignored" warnings across nearly
            # every translation unit, making it unusable.
            warnings: "-Wno-attributes"
            expensive-tests: true
            use-keep-going: true
            use-ignore-errors: true
            additional-cmake-options: "-DREDUCED_FEATURE_SET_FOR_CPP17=ON -DUSE_CPP_17_BACKPORTS=ON -DCMAKE_CXX_STANDARD_MANUALLY_OVERRIDDEN=17 -DCOMPILER_VERSION_CHECK_DEACTIVATED=ON"


    env:
      build-type: Release
      expensive-tests: true
      compiler: gcc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Install dependencies
        uses: ./.github/workflows/install-dependencies-ubuntu
      - name: Install compiler
        uses: ./.github/workflows/install-compiler-ubuntu
        with:
          compiler: ${{env.compiler}}
          compiler-version: ${{matrix.compiler-version}}
      - name: Rewrite C++20 'using enum' for C++17 compatibility
        if: matrix.compiler-version == 8
        run: |
          # The Docker container ghcr.io/joka921/llvm-enum-rewriter contains a custom
          # clang-21 build with the `backport-using-enum` tool at /opt/llvm/bin/.
          # It also has cmake, boost 1.81, icu, zstd, and jemalloc installed.
          # The docker image is built using the Dockerfile at
          # https://github.com/joka921/llvm-project/blob/2d1f59cd321c3a7efd6e47bd2e97413cafa912c9/Dockerfile
          # and will be extended and moved to a more stable location in the future.
          docker pull ghcr.io/joka921/llvm-enum-rewriter:latest

          # Generate compile_commands.json using the container's clang-21.
          docker run --user "$(id -u):$(id -g)" --rm \
            -v ${{github.workspace}}:/src \
            -w /src \
            ghcr.io/joka921/llvm-enum-rewriter:latest \
            bash -c "
              export PATH=/opt/llvm/bin:\$PATH
              cmake -B /src/rewriter-build \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DCMAKE_CXX_FLAGS='-Wno-deprecated-declarations' \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -DUSE_PARALLEL=true \
                -DUSE_PRECOMPILED_HEADERS=OFF \
                -DREDUCED_FEATURE_SET_FOR_CPP17=ON
            "

          # Run backport-using-enum on all src/ files containing 'using enum'.
          docker run --rm --user "$(id -u):$(id -g)" \
            -v ${{github.workspace}}:/src \
            -w /src \
            ghcr.io/joka921/llvm-enum-rewriter:latest \
            bash -c "
              for f in \$(grep -rl 'using enum' ./src/ --include='*.h' --include='*.cpp'); do
                echo \"Rewriting: \$f\"
                /opt/llvm/bin/backport-using-enum -p /src/rewriter-build \"\$f\"
              done
            "

          # Clean up the temporary build directory to save disk space.
          rm -rf ${{github.workspace}}/rewriter-build

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.build-type}} -DCMAKE_TOOLCHAIN_FILE="$(pwd)/toolchains/${{env.compiler}}${{matrix.compiler-version}}.cmake" -DADDITIONAL_COMPILER_FLAGS="${{matrix.warnings}}" -DUSE_PARALLEL=false -DRUN_EXPENSIVE_TESTS=${{env.expensive-tests}} -DENABLE_EXPENSIVE_CHECKS=true ${{matrix.additional-cmake-options}} -DADDITIONAL_LINKER_FLAGS="-B /usr/bin/mold"

      - name: Build
        # Build your program with the given configuration. For the gcc-11
        # entry, `matrix.build-target` names a single target
        # (`LibQLeverExample`); for the gcc-8 entry it is empty, so this
        # builds the default `all` target, i.e. every target that is defined
        # at all under `REDUCED_FEATURE_SET_FOR_CPP17` -- which, thanks to the
        # `if (NOT REDUCED_FEATURE_SET_FOR_CPP17)` guards around the
        # non-conforming executables in the various `CMakeLists.txt` files, is
        # exactly the set of C++17-compatible ones (including the unit test
        # suite).
        run: |
          TARGET=""
          if [[ -n "${{ matrix.build-target }}" ]]; then
            TARGET="--target ${{ matrix.build-target }}"
          fi
          KEEP_GOING=""
          if [[ "${{ matrix.use-keep-going }}" == "true" ]]; then
            KEEP_GOING="-k"
          fi
          IGNORE_ERRORS=""
          if [[ "${{ matrix.use-ignore-errors }}" == "true" ]]; then
          IGNORE_ERRORS="-i"
          fi
          set -o pipefail # the `tee` will never fail, but the `build` command might. We want to fail if the build fails.
          cmake --build ${{github.workspace}}/build $TARGET --config ${{env.build-type}} -- $IGNORE_ERRORS $KEEP_GOING -j $(nproc) 2>&1 | tee /tmp/build.log
        id: build

      - name: Run gcc8 log analyzer on gcc8 builds
        if: matrix.compiler-version == 8
        run: |
          python ${{ github.workspace }}/misc/gcc8_logs_analyzer.py /tmp/build.log --on-github
        id: gcc8_log_analyzer

      - name: Test
        id: runTest
        working-directory: ${{github.workspace}}/build
        # Execute tests defined by the CMake configuration.
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        # The gcc-11 entry only builds `LibQLeverExample` above, so scope it to
        # the one test target that exercises the public libqlever API
        # (`QleverTest`, see `test/libqlever/CMakeLists.txt`). The gcc-8 entry
        # builds and therefore runs the whole (C++17-compatible) unit test
        # suite.
        run: |
          LABEL=""
          if [[ "${{ matrix.compiler-version }}" == "11" ]]; then
            LABEL="-L QleverTest"
          fi
          env CTEST_OUTPUT_ON_FAILURE=1 ctest -C ${{matrix.build-type}} -j $(nproc) . $LABEL
